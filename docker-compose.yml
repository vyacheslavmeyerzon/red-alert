version: "3.8"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redalert}
      POSTGRES_USER: ${POSTGRES_USER:-redalert}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redalert}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://redalert:changeme@db:5432/redalert}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-2000}
      DEMO_MODE: ${DEMO_MODE:-false}
      HOST_LAN_IP: ${HOST_LAN_IP:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-ssl:/etc/nginx/ssl
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ ! -f /etc/nginx/ssl/cert.pem ]; then
          mkdir -p /etc/nginx/ssl
          apk add --no-cache openssl
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/ssl/key.pem -out /etc/nginx/ssl/cert.pem -subj '/CN=RedAlert'
        fi
        nginx -g 'daemon off;'
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  nginx-ssl:
