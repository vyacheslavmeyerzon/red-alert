events {
    worker_connections 1024;
}

http {
    # --- HTTP: serve everything without redirect ---
    server {
        listen 80;
        server_name _;

        # CA cert download (for mobile install)
        location = /ca.pem {
            alias /etc/nginx/ssl/ca-download.pem;
            default_type application/x-pem-file;
            add_header Content-Disposition 'attachment; filename="RedAlert-CA.pem"';
        }

        # SSE endpoint — disable buffering
        location = /api/alerts/stream {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
        }

        # API
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # Frontend
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    # --- HTTPS ---
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # CA cert download
        location = /ca.pem {
            alias /etc/nginx/ssl/ca-download.pem;
            default_type application/x-pem-file;
            add_header Content-Disposition 'attachment; filename="RedAlert-CA.pem"';
        }

        # SSE endpoint — disable buffering for real-time streaming
        location = /api/alerts/stream {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   Connection '';
            proxy_buffering    off;
            proxy_cache        off;
            chunked_transfer_encoding off;
            proxy_read_timeout 86400s;
        }

        # API requests
        location /api/ {
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Frontend
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
