<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <title>Red Alert - Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #94a3b8;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      direction: ltr;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #ef4444;
    }
    button {
      margin-top: 16px;
      padding: 10px 24px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    button:hover { background: #dc2626; }
    .saved {
      margin-top: 12px;
      color: #22c55e;
      font-size: 13px;
      display: none;
    }
    .desc {
      margin-top: 8px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <h1>🚨 Red Alert - Settings</h1>
  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="http://localhost" />
  <p class="desc">The address of your Red Alert Dashboard server. Default: http://localhost</p>
  <button id="saveBtn">Save</button>
  <p class="saved" id="savedMsg">Settings saved!</p>
  <script src="options.js"></script>
</body>
</html>
