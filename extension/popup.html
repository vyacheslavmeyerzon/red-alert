<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }
    .header {
      background: #1e293b;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    .header h1 {
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .connected { background: #22c55e; }
    .disconnected { background: #ef4444; }
    .content {
      padding: 12px 16px;
    }
    .no-alerts {
      text-align: center;
      padding: 24px 0;
      color: #94a3b8;
    }
    .alert-card {
      background: #1e293b;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border-right: 3px solid #ef4444;
    }
    .alert-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .alert-cities {
      font-size: 12px;
      color: #94a3b8;
    }
    .alert-time {
      font-size: 11px;
      color: #64748b;
      margin-top: 4px;
    }
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #334155;
      text-align: center;
    }
    .footer a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
    }
    .settings-link {
      font-size: 12px;
      color: #94a3b8;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>🚨</span> Red Alert</h1>
    <span class="status-dot" id="status"></span>
  </div>
  <div class="content" id="content">
    <div class="no-alerts">ממתין להתרעות...</div>
  </div>
  <div class="footer">
    <button class="settings-link" id="settingsBtn">⚙️ Settings</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
